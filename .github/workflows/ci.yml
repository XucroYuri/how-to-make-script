name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate assets
        run: python scripts/validate_assets.py

      - name: Check routes
        run: python scripts/check_routes.py

      - name: Check route overlaps
        run: python scripts/check_route_overlaps.py

      - name: Check semantic consistency
        run: python scripts/check_semantic_consistency.py

      - name: Check subagent registries
        run: python scripts/check_subagent_registries.py

      - name: Check community surfaces
        run: python scripts/check_community_surfaces.py

      - name: Check links
        run: python scripts/check_links.py

      - name: Check forbidden paths
        run: python scripts/check_forbidden_paths.py

      - name: Check question todos
        run: python scripts/check_question_todos.py

      - name: Run fixture suite
        run: python scripts/run_fixture_suite.py

      - name: Generate index
        run: python scripts/generate_index.py > /dev/null
