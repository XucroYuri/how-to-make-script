  <text x="512" y="256" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="13">intent × medium</text>
  <text x="520" y="276" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="13">stage × output</text>

  <rect x="668" y="198" width="148" height="84" rx="18" fill="#A7E0D9" stroke="#1A2D3A" stroke-width="3"/>
