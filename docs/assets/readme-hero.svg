  <text x="878" y="256" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="13">draft / map / guide</text>
  <text x="878" y="276" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="13">plan / report / pack</text>

  <rect x="1032" y="198" width="102" height="84" rx="18" fill="#FFF9F2" stroke="#1A2D3A" stroke-width="3"/>
