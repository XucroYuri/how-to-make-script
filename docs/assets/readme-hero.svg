  <text x="249" y="263" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700">HUMAN-IN-THE-LOOP</text>

  <rect x="90" y="314" width="250" height="110" rx="20" fill="#FFF9F2" stroke="#1A2D3A" stroke-width="3"/>
  <text x="116" y="350" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">What it does</text>
  <text x="116" y="382" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">Write, diagnose, review, adapt,</text>
  <text x="116" y="406" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">orchestrate, and pressure-test</text>
  <text x="116" y="430" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">screenplay work across media.</text>

  <rect x="90" y="448" width="250" height="168" rx="20" fill="#FFF9F2" stroke="#1A2D3A" stroke-width="3"/>
  <text x="116" y="484" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">What makes it different</text>
  <text x="116" y="516" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">• Explicit routes, not prompt soup</text>
  <text x="116" y="542" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">• Contestable heuristics, not one truth</text>
  <text x="116" y="568" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">• Bounded loading, not context bloat</text>
  <text x="116" y="594" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">• Reviewable assets, not hidden lore</text>

  <rect x="444" y="104" width="732" height="512" rx="28" fill="#F0E7DB"/>
  <text x="482" y="150" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Route → Knowledge → Artifact → Quality Gate → Community Feedback</text>

  <rect x="486" y="198" width="148" height="84" rx="18" fill="#FFF9F2" stroke="#1A2D3A" stroke-width="3"/>
