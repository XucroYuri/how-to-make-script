  <text x="856" y="374" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Current coverage</text>
  <text x="856" y="404" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">narrative · commercial · interactive</text>
  <text x="856" y="428" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">voice · video bridge · team · quality gate</text>

  <rect x="486" y="490" width="648" height="92" rx="20" fill="#1A2D3A"/>
  <text x="516" y="528" fill="#FFF9F2" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Built for humans and agents at the same time</text>
  <text x="516" y="556" fill="#A7E0D9" font-family="Helvetica, Arial, sans-serif" font-size="14">Learn the craft, route the task, pressure-test the output, keep the disagreement, improve the system.</text>
