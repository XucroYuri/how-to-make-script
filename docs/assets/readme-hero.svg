  <text x="1046" y="278" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="13">recheck</text>

  <path d="M634 240H668" stroke="#1A2D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M816 240H850" stroke="#1A2D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M998 240H1032" stroke="#1A2D3A" stroke-width="4" stroke-linecap="round"/>

  <rect x="486" y="338" width="300" height="112" rx="20" fill="#FFF9F2" stroke="#1A2D3A" stroke-width="3"/>
  <text x="516" y="374" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Core asset families</text>
  <text x="516" y="404" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">knowledge atoms · workflow protocols</text>
  <text x="516" y="428" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="14">evaluation rubrics · example fixtures</text>

