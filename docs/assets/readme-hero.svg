  <text x="120" y="152" fill="#FFF9F2" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">how-to-make-script</text>
  <text x="120" y="196" fill="#A7E0D9" font-family="Helvetica, Arial, sans-serif" font-size="16">Research-first screenplay knowledge system</text>
  <text x="120" y="226" fill="#A7E0D9" font-family="Helvetica, Arial, sans-serif" font-size="16">and agent skill library</text>
  <rect x="120" y="246" width="106" height="24" rx="12" fill="#A7E0D9"/>
  <text x="136" y="263" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700">ROUTE-FIRST</text>
