  <text x="700" y="276" fill="#1A2D3A" font-family="Helvetica, Arial, sans-serif" font-size="13">minimal bundle</text>

  <rect x="850" y="198" width="148" height="84" rx="18" fill="#FFB38A" stroke="#1A2D3A" stroke-width="3"/>
